name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: mvn test

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Get JAR filename
        run: echo "JAR_FILE=$(ls target/*.jar | head -1)" >> $GITHUB_ENV

      - name: Deploy to Staging
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: demo-app-staging
          environment_name: Demo-app-staging-env
          region: us-west-2
          version_label: ${{ github.sha }}-staging
          deployment_package: ${{ env.JAR_FILE }}

      - name: Smoke test staging
        run: |
          sleep 30
          curl --fail ${{ secrets.STAGING_URL }} || exit 1

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Get JAR filename
        run: echo "JAR_FILE=$(ls target/*.jar | head -1)" >> $GITHUB_ENV

      - name: Deploy to Production
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: demo-app
          environment_name: Demo-app-env
          region: us-west-2
          version_label: ${{ github.sha }}
          deployment_package: ${{ env.JAR_FILE }}